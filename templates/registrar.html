{% extends "base.html" %}
{% block title %}Registro - OrganizeIt{% endblock %}
{% block content %}

<h2>Crear Cuenta</h2>
<p>Completa tus datos para registrarte en OrganizeIt</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST" action="{{ url_for('registrar') }}">
    <h3>Información Personal</h3>
    
    <label for="nombre"><strong>Nombre(s):</strong></label>
    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
    
    <label for="apellido"><strong>Apellido(s):</strong></label>
    <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>
    
    <label for="contacto"><strong>Correo Electrónico:</strong></label>
    <input type="email" id="contacto" name="contacto" 
        placeholder="ejemplo@correo.com" required>
    
    <hr>
    
    <h3>Seguridad</h3>
    
    <label for="contrasena"><strong>Contraseña:</strong></label>
    <input type="password" id="contrasena" name="contrasena" 
        placeholder="Mínimo 6 caracteres" required>
    
    <label for="confirmaContraseña"><strong>Confirmar Contraseña:</strong></label>
    <input type="password" id="confirmaContraseña" name="confirmaContraseña" 
        placeholder="Repite tu contraseña" required>
    
    <hr>
    
    <div style="text-align: center;">
        <button type="submit">Crear Cuenta</button>
        <br><br>
        <a href="{{ url_for('login') }}">
            <button type="button" class="btn-secondary">Volver al Inicio de Sesión</button>
        </a>
    </div>
</form>

{% endblock %}
