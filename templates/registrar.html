{% extends "base.html" %}

{% block content %}
<h2>📝 Registro de Usuario</h2>

<form action="#" method="POST">
    <label for="nombre">Nombre completo:</label>
    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
    <br><br>

    <label for="email">Correo electrónico:</label>
    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
    <br><br>

    <label for="usuario">Usuario:</label>
    <input type="text" id="usuario" name="usuario" placeholder="Elige un usuario" required>
    <br><br>

    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password" placeholder="Elige una contraseña" required>
    <br><br>

    <label for="confirmar">Confirmar contraseña:</label>
    <input type="password" id="confirmar" name="confirmar" placeholder="Repite tu contraseña" required>
    <br><br>

    <button type="submit">Registrarme</button>
</form>

<br>
<p>¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
{% endblock %}
