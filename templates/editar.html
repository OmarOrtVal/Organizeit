{% extends "base.html" %}

{% block content %}
<h2>Editar Tarea</h2>

<form action="{{ url_for('actualizar_tarea', tarea_id=tarea.id) }}" method="POST">
    <input type="hidden" name="categoria" value="{{ categoria_actual }}">

    <label for="nombre">Nombre de la tarea:</label>
    <input type="text" id="nombre" name="nombre" value="{{ tarea.nombre }}" required>
    <br><br>

    <label for="prioridad">Prioridad:</label>
    <select id="prioridad" name="prioridad">
        <option value="Alta" {% if tarea.prioridad == "Alta" %}selected{% endif %}>🔴 Alta</option>
        <option value="Media" {% if tarea.prioridad == "Media" %}selected{% endif %}>🟡 Media</option>
        <option value="Baja" {% if tarea.prioridad == "Baja" %}selected{% endif %}>🟢 Baja</option>
    </select>
    <br><br>

    <label for="fecha_limite">Fecha límite:</label>
    <input type="date" id="fecha_limite" name="fecha_limite" value="{{ tarea.fecha_limite }}" required>
    <br><br>

    <button type="submit">Guardar cambios</button>
    <a href="{{ url_for('index', categoria=categoria_actual) }}">
        <button type="button">Cancelar</button>
    </a>
</form>
{% endblock %}
